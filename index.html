    function renderInstallBanner() {
      const el = document.getElementById('installBanner');
      if (!ui.deferredPrompt) {
        el.classList.remove('show');
        el.innerHTML = '';
        return;
      }
      el.classList.add('show');
      el.innerHTML = `
        <div style="display:flex;align-items:center;gap:12px;">
          <img src="${LOGO_URL}" style="width:48px;height:48px;border-radius:14px;object-fit:cover;">
          <div style="flex:1;min-width:0;">
            <div style="font-weight:800;">Install HV Shopping List</div>
            <div class="small" style="color:rgba(255,255,255,.86)">Fast offline access from your home screen</div>
          </div>
          <button class="soft-btn" style="border:none" onclick="promptInstall()">Install</button>
          <button class="soft-btn" style="border:none" onclick="dismissInstallBanner()">×</button>
        </div>
      `;
    }

    function promptInstall() {
      if (!ui.deferredPrompt) return;
      ui.deferredPrompt.prompt();
      ui.deferredPrompt.userChoice.finally(() => {
        ui.deferredPrompt = null;
        renderInstallBanner();
      });
    }

    function dismissInstallBanner() {
      ui.deferredPrompt = null;
      renderInstallBanner();
    }

    function handleMic(context) {
      if (state.settings.voiceEnabled === false) return showToast('Voice input is disabled in settings.', 'warning');
      const SpeechApi = window.SpeechRecognition || window.webkitSpeechRecognition;
      if (!SpeechApi) return showToast('Voice input requires Chrome.', 'error');
      if (ui.currentRecognition) {
        try { ui.currentRecognition.abort(); } catch (e) {}
      }
      const recognition = new SpeechApi();
      ui.currentRecognition = recognition;
      recognition.continuous = false;
      recognition.interimResults = true;
      recognition.maxAlternatives = 3;
      recognition.lang = state.settings.voiceLang || 'en-US';
      let finalTranscript = '';
      showVoicePanel(context);
      setTimeout(() => { try { recognition.start(); } catch (e) { hideVoicePanel(); } }, 300);
      recognition.onresult = (event) => {
        let interim = '';
        for (let i = event.resultIndex; i < event.results.length; i++) {
          if (event.results[i].isFinal) finalTranscript += event.results[i][0].transcript;
          else interim += event.results[i][0].transcript;
        }
        document.getElementById('voiceTranscript').textContent = interim || finalTranscript;
      };
      recognition.onend = () => {
        ui.currentRecognition = null;
        hideVoicePanel();
        if (finalTranscript.trim()) processVoiceInput(finalTranscript.trim(), context);
      };
      recognition.onerror = () => {
        ui.currentRecognition = null;
        hideVoicePanel();
        showToast('Voice input failed. Try again.', 'error');
      };
    }

    function stopVoiceRecognition() {
      if (ui.currentRecognition) {
        try { ui.currentRecognition.stop(); } catch (e) {}
      }
      hideVoicePanel();
    }

    function showVoicePanel(context) {
      const hints = {
        smart: 'Say a product name or “Open list Hardware”.',
        'quick-add': 'Speak product name to add instantly.',
        notes: 'Speak notes for this product.'
      };
      document.getElementById('voiceHint').textContent = hints[context] || 'Speak now';
      document.getElementById('voiceTranscript').textContent = '';
      document.getElementById('voicePanel').classList.add('show');
    }

    function hideVoicePanel() {
      document.getElementById('voicePanel').classList.remove('show');
    }

    function processVoiceInput(transcript, context) {
      const lower = transcript.toLowerCase().trim();
      if (lower.startsWith('open list ') || lower.startsWith('switch list ')) {
        const name = lower.replace(/^open list\s+|^switch list\s+/,'').trim();
        const match = state.lists.find(l => displayListName(l).toLowerCase().includes(name) || l.name.toLowerCase().includes(name));
        if (match) {
          switchToList(match.id);
          showToast(`Opened ${displayListName(match)}`, 'success');
          return;
        }
      }
      if (context === 'notes') {
        const notes = document.getElementById('productNotesInput');
        if (notes) notes.value = `${notes.value}${notes.value ? ' ' : ''}${transcript}`;
        return;
      }
      if (context === 'quick-add') {
        createQuickProduct(capitalizeWords(transcript), []);
        return;
      }
      if (context === 'smart-voice-add') {
        processSmartVoice(transcript);
        return;
      }
      document.getElementById('quickAddInput').value = capitalizeWords(transcript);
      createQuickProduct(capitalizeWords(transcript), []);
    }

    function capitalizeWords(str) {
      return str.replace(/\b\w/g, c => c.toUpperCase());
    }

    // AI CORE
    async function callGroq(userPrompt, systemPrompt = "You are a helpful assistant.") {
      const { apiKey, model, enabled } = state.aiSettings;
      if (!enabled || !apiKey) throw new Error('AI features not set up in Settings');
      if (!navigator.onLine) throw new Error('Internet connection required for AI features');

      // Check Cache
      const cacheKey = btoa(unescape(encodeURIComponent(systemPrompt + userPrompt)));
      if (state.aiCache[cacheKey]) {
        const cached = state.aiCache[cacheKey];
        if (Date.now() - cached.timestamp < 7 * 24 * 60 * 60 * 1000) return cached.response;
      }

      try {
        const response = await fetch('https://api.groq.com/openai/v1/chat/completions', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${apiKey}` },
          body: JSON.stringify({
            model: model,
            messages: [{ role: 'system', content: systemPrompt }, { role: 'user', content: userPrompt }],
            temperature: 0.7,
            max_tokens: 1024
          })
        });

        if (!response.ok) {
          if (response.status === 401) throw new Error('Invalid API Key');
          if (response.status === 429) throw new Error('Too many requests. Please wait.');
          throw new Error('AI API Error');
        }

        const data = await response.json();
        const content = data.choices[0].message.content;

        // Save Cache
        state.aiCache[cacheKey] = { response: content, timestamp: Date.now() };
        // Limit cache size
        const cacheKeys = Object.keys(state.aiCache);
        if (cacheKeys.length > 100) delete state.aiCache[cacheKeys[0]];
        
        saveState();
        return content;
      } catch (err) {
        console.error('Groq Call Failed:', err);
        throw err;
      }
    }

    // AI UI HELPERS
    function toggleAiEnabled() { state.aiSettings.enabled = !state.aiSettings.enabled; saveState(); }
    function updateAiSetting(key, val) { state.aiSettings[key] = val; saveState(); }
    function toggleAiAutoFeature(key) { state.aiSettings.autoFeatures[key] = !state.aiSettings.autoFeatures[key]; saveState(); }
    function clearAiCache() { state.aiCache = {}; saveState(); showToast('AI Cache cleared', 'info'); }

    async function testGroqKey() {
      try {
        showToast('Testing connection...', 'info');
        await callGroq('test connection', 'Reply with only "✅"');
        showToast('API Key verified! ✅', 'success');
      } catch (err) {
        showToast(err.message, 'error');
      }
    }

    function clearChatHistory() {
      state.aiChatHistory = [];
      saveState();
      renderApp();
    }

    async function sendChatMessage() {
      const input = document.getElementById('aiChatInput');
      const text = input.value.trim();
      if (!text) return;

      const userMsg = { role: 'user', content: text, timestamp: Date.now() };
      state.aiChatHistory.push(userMsg);
      input.value = '';
      renderApp();
      scrollToBottom('aiChatMessages');

      try {
        const typingId = addTypingIndicator('aiChatMessages');
        const systemPrompt = `You are HV-AI, a smart shop assistant for Hassan Variety Store in Pakistan. Use this data if relevant: ${JSON.stringify(state.products.slice(0, 50))}. Respond in ${state.aiSettings.language}. Be concise. PKR currency. Understand Roman Urdu.`;
        const reply = await callGroq(text, systemPrompt);
        removeTypingIndicator(typingId);

        state.aiChatHistory.push({ role: 'assistant', content: reply, timestamp: Date.now() });
        if (state.aiChatHistory.length > 50) state.aiChatHistory.shift();
        saveState();
        scrollToBottom('aiChatMessages');
      } catch (err) {
        showToast(err.message, 'error');
      }
    }

    function scrollToBottom(id) {
      const el = document.getElementById(id);
      if (el) el.scrollTop = el.scrollHeight;
    }

    function addTypingIndicator(containerId) {
      const el = document.getElementById(containerId);
      if (!el) return null;
      const id = 'typing_' + Date.now();
      const div = document.createElement('div');
      div.id = id;
      div.className = 'typing-indicator';
      div.innerHTML = '<div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div>';
      el.appendChild(div);
      el.scrollTop = el.scrollHeight;
      return id;
    }

    function removeTypingIndicator(id) {
      const el = document.getElementById(id);
      if (el) el.remove();
    }

    function askAiAction(action) {
      const inputs = {
        'weekly report': 'Generate a weekly summary report of my inventory highlights.',
        'ramadan suggestions': 'What items should I stock up for Ramadan at my Pakistani variety shop?',
        'find duplicates': 'Analyze my products and find similar or duplicate names.',
        'budget planner': 'I have a budget of Rs. 5000. Which urgent items should I buy first?'
      };
      const text = inputs[action];
      if (text) {
        document.getElementById('aiChatInput').value = text;
        sendChatMessage();
      }
    }

    function openAIChat() {
      if (ui.view === 'ai') return;
      setView('ai');
    }

    // AI FEATURE INTEGRATIONS
    async function aiSuggestCategory(productName) {
      if (!state.aiSettings.enabled || !state.aiSettings.autoFeatures.autoCategory || state.categories.length === 0) return;
      try {
        const catNames = state.categories.map(c => c.name).join(', ');
        const prompt = `Suggest one category from this list: [${catNames}] for product: "${productName}". Reply with only the category name.`;
        const res = await callGroq(prompt, "You are a product categorizer. Reply only with a category name.");
        const match = state.categories.find(c => c.name.toLowerCase().includes(res.toLowerCase().trim()));
        if (match) {
          const picks = document.querySelectorAll('[data-role="product-category"]');
          picks.forEach(p => { if (p.dataset.id === match.id) p.classList.add('on'); });
          showToast(`AI Suggested: ${match.name}`, 'info');
        }
      } catch (e) {}
    }

    async function aiSuggestPrice(productName) {
      if (!state.aiSettings.enabled || !state.aiSettings.apiKey) return;
      try {
        showToast('AI estimating price...', 'info');
        const res = await callGroq(`Estimate average retail price in PKR for: "${productName}" in Pakistan. Reply with ONLY the number.`, "You are a price expert.");
        const price = parseFloat(res.replace(/[^\d.]/g, ''));
        if (price) {
          document.getElementById('productPriceInput').value = price;
          updateProductTotalPreview();
          showToast(`AI Estimated Price: Rs. ${price}`, 'success');
        }
      } catch (e) {}
    }

    async function aiFixNameSpelling(inputEl) {
      if (!state.aiSettings.enabled || !state.aiSettings.autoFeatures.nameCorrection) return;
      const name = inputEl.value;
      if (name.length < 3) return;
      try {
        const res = await callGroq(`Correct spelling of this Pakistani shop product: "${name}". Reply with only the corrected name.`, "You are a spelling corrector.");
        if (res.toLowerCase().trim() !== name.toLowerCase().trim()) {
          const parent = inputEl.closest('.field');
          const old = document.getElementById('aiSpellFix');
          if (old) old.remove();
          const chip = document.createElement('button');
          chip.id = 'aiSpellFix';
          chip.className = 'chip orange';
          chip.style.marginTop = '8px';
          chip.innerHTML = `Did you mean: ${res}?`;
          chip.onclick = () => { inputEl.value = res; chip.remove(); };
          parent.appendChild(chip);
        }
      } catch (e) {}
    }

    async function aiTranslateName() {
      const input = document.getElementById('productNameInput');
      if (!input.value) return;
      try {
        showToast('Translating...', 'info');
        const res = await callGroq(`Translate this shop product name to both English and Urdu: "${input.value}". Format: English / Urdu. Reply only with the translation.`, "You are a translator.");
        input.value = res;
      } catch (e) { showToast(e.message, 'error'); }
    }

    async function aiEnhancedShare() {
      const active = getActiveList();
      if (!active) return;
      const products = state.products.filter(p => p.listId === active.id);
      if (!products.length) return showToast('List is empty', 'warning');
      
      try {
        showToast('AI generating message...', 'info');
        const data = products.map(p => `${p.name} (${p.quantity} ${p.unit})`).join(', ');
        const prompt = `Convert this shopping list into a polite WhatsApp message in ${state.aiSettings.language} for a supplier. Include a professional greeting and thank you. List: ${data}`;
        const res = await callGroq(prompt, "You are a communication expert.");
        
        openOverlay(`
          <div class="overlay-header"><strong>AI-Enhanced Message</strong><button class="icon-btn" onclick="closeOverlay()"><i class="fas fa-times"></i></button></div>
          <div class="overlay-body">
            <textarea id="aiShareText" class="field textarea" style="height:200px; width:100%; border-radius:12px; padding:12px;">${res}</textarea>
          </div>
          <div class="overlay-footer">
            <button class="soft-btn" onclick="closeOverlay()">Cancel</button>
            <button class="primary-btn" onclick="window.open('https://wa.me/?text=' + encodeURIComponent(document.getElementById('aiShareText').value))"><i class="fab fa-whatsapp"></i> Share on WhatsApp</button>
          </div>
        `, 'sheet');
      } catch (e) { showToast(e.message, 'error'); }
    }

    async function aiSmartSearch(query) {
      if (!ui.aiSearch || !query) return getGlobalSearchResults();
      try {
        const productNames = state.products.map(p => ({ id: p.id, name: p.name }));
        const prompt = `Find products related to: "${query}" from this list: ${JSON.stringify(productNames)}. Reply with only the comma-separated IDs of the most relevant 10 products. If none, reply "none".`;
        const res = await callGroq(prompt, "You are a semantic search engine.");
        if (res.toLowerCase().includes('none')) return [];
        const ids = res.split(',').map(id => id.trim());
        return state.products.filter(p => ids.includes(p.id));
      } catch (e) { return getGlobalSearchResults(); }
    }

    // Overriding getGlobalSearchResults to support AI Search
    const originalGetGlobalSearchResults = getGlobalSearchResults;
    async function updateGlobalSearchResultsWithAI() {
      if (!ui.aiSearch || !ui.filters.search) return;
      try {
        const results = await aiSmartSearch(ui.filters.search);
        ui.aiSearchResults = results;
        renderApp();
      } catch (e) {}
    }

    function openBulkAddModal() {
      openOverlay(`
        <div class="overlay-header"><strong>Bulk Add Products</strong><button class="icon-btn" onclick="closeOverlay()"><i class="fas fa-times"></i></button></div>
        <div class="overlay-body">
          <p class="small muted mb-2">Enter products one per line. Example: 2 kg rice, 5 pcs bulbs</p>
          <textarea id="bulkAddArea" class="field textarea" style="height:150px; margin-bottom:12px;" placeholder="LED Bulb&#10;Wire Roll&#10;10 pcs Switches"></textarea>
          <div style="display:flex; gap:8px;">
            <button class="primary-btn" style="flex:1" onclick="aiSmartBulkAdd()"><i class="fas fa-wand-sparkles"></i> AI Smart Add</button>
            <button class="soft-btn" style="flex:1" onclick="manualBulkAdd()">Add Manually</button>
          </div>
        </div>
      `, 'sheet');
    }

    async function processSmartVoice(transcript) {
      try {
        showToast('AI extracting details...', 'info');
        const prompt = `Extract product details as JSON with fields: name, quantity (number), unit (string), unitPrice (number), supplier, tag (one of: urgent, favorite, buy-soon, normal). Input: "${transcript}". Reply ONLY with valid JSON.`;
        const res = await callGroq(prompt, "You are a structured data extractor.");
        const details = JSON.parse(res.match(/\{.*\}/s)[0]);
        
        const active = getActiveList();
        const product = {
          id: uid('prod'), listId: active.id, name: capitalizeWords(details.name || transcript),
          categoryIds: [], tagIds: details.tag ? [details.tag] : [], labelIds: [], 
          quantity: details.quantity || 1, unit: details.unit || 'pcs',
          unitPrice: details.unitPrice || 0, supplier: details.supplier || '', notes: '', 
          isPinned: false, isCompleted: false, createdAt: Date.now(), completedAt: null
        };
        state.products.push(product);
        saveState();
        showToast(`AI added: ${product.name}`, 'success');
        if (state.aiSettings.autoFeatures.autoCategory) aiSuggestCategory(product.name);
      } catch (e) { showToast('AI extraction failed', 'error'); }
    }

    async function aiSmartBulkAdd() {
      const text = document.getElementById('bulkAddArea').value.trim();
      if (!text) return;
      try {
        showToast('AI parsing items...', 'info');
        const prompt = `Parse this shopping list into a JSON array of objects with fields "name", "quantity" (number), "unit" (string). Input: "${text}". Reply ONLY with the JSON array.`;
        const res = await callGroq(prompt, "You are a JSON data parser.");
        const items = JSON.parse(res.match(/\[.*\]/s)[0]);
        
        const active = getActiveList();
        items.forEach(item => {
          state.products.push({
            id: uid('prod'), listId: active.id, name: capitalizeWords(item.name),
            categoryIds: [], tagIds: [], labelIds: [], quantity: item.quantity || 1, unit: item.unit || 'pcs',
            unitPrice: 0, supplier: '', notes: '', isPinned: false, isCompleted: false, createdAt: Date.now(), completedAt: null
          });
        });
        saveState();
        closeOverlay();
        showToast(`AI added ${items.length} items`, 'success');
      } catch (e) { showToast('AI parsing failed. Try manual add.', 'error'); }
    }

    function manualBulkAdd() {
      const text = document.getElementById('bulkAddArea').value.trim();
      if (!text) return;
      const lines = text.split('\n').map(l => l.trim()).filter(l => l);
      const active = getActiveList();
      lines.forEach(name => {
        state.products.push({
          id: uid('prod'), listId: active.id, name: capitalizeWords(name),
          categoryIds: [], tagIds: [], labelIds: [], quantity: 1, unit: 'pcs',
          unitPrice: 0, supplier: '', notes: '', isPinned: false, isCompleted: false, createdAt: Date.now(), completedAt: null
        });
      });
      saveState();
      closeOverlay();
      showToast(`Added ${lines.length} items`, 'success');
    }
  </script>
