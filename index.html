  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.getRegistrations().then((regs) => {
        regs.forEach((reg) => {
          if (!reg.scope.includes('/HV-Shopping-List/')) reg.unregister();
        });
      });
      caches.keys().then((names) => {
        names.forEach((name) => {
          if (name !== 'hv-shopping-list-v3') caches.delete(name);
        });
      }).catch(() => {});
    }
  </script>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    :root {
      --primary: #1E3A8A;
      --primary-2: #2C4CB0;
      --accent: #F97316;
      --accent-2: #FB923C;
      --bg: #FFFFFF;
      --bg-soft: #F3F4F6;
      --bg-softer: #F8FAFC;
      --surface: #FFFFFF;
      --surface-2: #F8FAFC;
      --text: #111827;
      --text-muted: #6B7280;
      --border: #E5E7EB;
      --success: #16A34A;
      --warning: #F59E0B;
      --danger: #EF4444;
      --shadow-sm: 0 2px 10px rgba(15, 23, 42, 0.08);
      --shadow-md: 0 10px 30px rgba(15, 23, 42, 0.12);
      --shadow-lg: 0 20px 40px rgba(15, 23, 42, 0.16);
      --radius: 18px;
      --radius-sm: 12px;
      --header-h: 122px;
      --nav-h: 76px;
      --fab-size: 58px;
      --app-max: 480px;
    }

    [data-theme="dark"] {
      --bg: #0F172A;
      --bg-soft: #111827;
      --bg-softer: #0B1220;
      --surface: #1E293B;
      --surface-2: #263244;
      --text: #F8FAFC;
      --text-muted: #94A3B8;
      --border: #334155;
      --shadow-sm: 0 2px 10px rgba(0,0,0,0.25);
      --shadow-md: 0 10px 30px rgba(0,0,0,0.35);
      --shadow-lg: 0 20px 40px rgba(0,0,0,0.45);
    }

    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; min-height: 100%; }
    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(180deg, var(--bg-soft), #E5E7EB);
      color: var(--text);
      -webkit-tap-highlight-color: transparent;
    }

    h1, h2, h3, h4, .display { font-family: 'Poppins', sans-serif; }
    button, input, textarea, select { font-family: inherit; }
    input, textarea, select { font-size: 16px; }

    .desktop-wrap {
      width: 100%;
      display: flex;
      justify-content: center;
      min-height: 100dvh;
    }

    .app-shell {
      width: 100%;
      max-width: var(--app-max);
      min-height: 100dvh;
      background: var(--bg);
      position: relative;
      overflow-x: hidden;
    }

    @media (min-width: 600px) {
      body { padding: 14px 0; }
      .app-shell {
        min-height: calc(100dvh - 28px);
        border-radius: 28px;
        box-shadow: var(--shadow-lg);
        border: 1px solid rgba(255,255,255,0.45);
        overflow: hidden;
      }
    }

    .frame-fixed {
      width: min(100vw, var(--app-max));
      left: 50%;
      transform: translateX(-50%);
      position: fixed;
      z-index: 40;
    }

    @media (min-width: 600px) {
      .frame-fixed {
        width: var(--app-max);
      }
    }

    .top-header {
      top: 0;
      background: color-mix(in srgb, var(--surface) 92%, transparent);
      backdrop-filter: blur(18px);
      border-bottom: 1px solid var(--border);
      padding: 10px 14px 12px;
    }

    .top-row {
      display: grid;
      grid-template-columns: auto 1fr auto;
      align-items: center;
      gap: 10px;
      min-height: 52px;
    }

    .left-pack, .right-pack { display: flex; align-items: center; gap: 8px; }
    .icon-btn {
      width: 44px; height: 44px; border: none; border-radius: 50%; cursor: pointer;
      background: var(--surface-2); color: var(--text); display: flex; align-items: center; justify-content: center;
      font-size: 18px; box-shadow: var(--shadow-sm);
    }

    .logo-thumb {
      width: 44px; height: 44px; border-radius: 12px; object-fit: cover; flex-shrink: 0;
      border: 2px solid rgba(249,115,22,0.18);
    }

    .current-list-btn {
      min-height: 44px; border: none; border-radius: 14px; padding: 0 12px; background: var(--surface-2);
      color: var(--text); display: flex; align-items: center; justify-content: center; gap: 8px;
      box-shadow: var(--shadow-sm); cursor: pointer; font-weight: 700; width: 100%;
    }

    .current-list-btn .list-title {
      display: block; max-width: 180px; overflow: hidden; white-space: nowrap; text-overflow: ellipsis;
      font-size: 15px;
    }

    .quick-add-area { margin-top: 10px; position: relative; }
    .quick-add-wrap {
      display: grid; grid-template-columns: auto 1fr auto auto; gap: 8px; align-items: center;
      background: var(--surface-2); border: 1px solid var(--border); border-radius: 18px; padding: 10px 10px 10px 14px;
      box-shadow: var(--shadow-sm);
    }

    .quick-add-wrap i.leading { color: var(--accent); font-size: 18px; }
    .quick-add-input {
      border: none; outline: none; background: transparent; color: var(--text); min-width: 0;
    }

    .mini-btn {
      width: 36px; height: 36px; border: none; border-radius: 12px; cursor: pointer;
      background: rgba(30,58,138,0.08); color: var(--primary); display: flex; align-items: center; justify-content: center;
    }

    .quick-dropdown {
      position: absolute; top: calc(100% + 8px); left: 0; right: 0; background: var(--surface);
      border: 1px solid var(--border); border-radius: 18px; box-shadow: var(--shadow-md); overflow: hidden; z-index: 45;
    }

    .quick-dropdown.hidden { display: none; }
    .drop-row {
      padding: 12px 14px; display: flex; align-items: center; justify-content: space-between; gap: 12px;
      border-bottom: 1px solid var(--border); cursor: pointer; min-height: 48px;
    }
    .drop-row:last-child { border-bottom: none; }
    .drop-row:active { background: var(--bg-soft); }

    .offline-banner {
      top: var(--header-h);
      background: var(--warning); color: #fff; text-align: center; padding: 8px 12px; font-size: 13px; font-weight: 700;
      display: none;
    }

    .main-content {
      padding: calc(var(--header-h) + 12px) 14px calc(var(--nav-h) + 32px);
      min-height: 100dvh;
    }

    .view-card {
      background: var(--surface); border: 1px solid var(--border); border-radius: 22px;
      box-shadow: var(--shadow-sm); padding: 16px;
    }

    .hero-card {
      background: linear-gradient(135deg, var(--primary), #2747AA 55%, var(--accent));
      color: #fff; border-radius: 24px; padding: 18px; box-shadow: var(--shadow-md);
    }

    .muted { color: var(--text-muted); }
    .small { font-size: 12px; }
    .section-title {
      font-size: 13px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-muted);
      margin: 18px 2px 10px;
    }

    .grid-2 { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
    .h-scroll { display: flex; gap: 12px; overflow-x: auto; padding-bottom: 2px; scrollbar-width: none; }
    .h-scroll::-webkit-scrollbar { display: none; }

    .stat-card {
      background: var(--surface); border: 1px solid var(--border); border-radius: 18px; padding: 14px;
      display: flex; flex-direction: column; gap: 8px; box-shadow: var(--shadow-sm); min-height: 106px; cursor: pointer;
    }

    .stat-icon {
      width: 38px; height: 38px; border-radius: 12px; display: flex; align-items: center; justify-content: center;
      background: rgba(249,115,22,0.15); color: var(--accent); font-size: 18px;
    }

    .stat-num { font-size: 24px; font-weight: 800; font-family: 'Poppins', sans-serif; }
    .chip-row { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 2px; scrollbar-width: none; }
    .chip-row::-webkit-scrollbar { display: none; }

    .chip {
      border: 1px solid var(--border); background: var(--surface); color: var(--text-muted);
      height: 34px; border-radius: 999px; padding: 0 14px; white-space: nowrap; cursor: pointer;
      display: inline-flex; align-items: center; gap: 8px; font-weight: 700; font-size: 13px;
    }
    .chip.active { background: var(--primary); color: #fff; border-color: var(--primary); }
    .chip.orange.active { background: var(--accent); border-color: var(--accent); }
    .dot { width: 9px; height: 9px; border-radius: 50%; display: inline-block; }

    .search-block {
      background: var(--surface); border: 1px solid var(--border); border-radius: 18px; padding: 10px 14px;
      box-shadow: var(--shadow-sm);
    }

    .search-line { display: flex; align-items: center; gap: 10px; }
    .search-line input {
      flex: 1; border: none; outline: none; background: transparent; color: var(--text);
    }

    .list-card {
      min-width: 170px; border-radius: 20px; padding: 14px; color: #fff; box-shadow: var(--shadow-sm); cursor: pointer;
      display: flex; flex-direction: column; gap: 10px;
    }

    .progress-track {
      width: 100%; height: 10px; background: rgba(255,255,255,0.24); border-radius: 999px; overflow: hidden;
    }
    .progress-fill { height: 100%; background: #fff; border-radius: 999px; }

    .scope-banner {
      display: flex; align-items: center; justify-content: space-between; gap: 10px; margin-bottom: 12px;
      background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 12px 14px; box-shadow: var(--shadow-sm);
    }

    .category-group {
      margin-bottom: 14px; background: var(--surface); border: 1px solid var(--border); border-radius: 20px; box-shadow: var(--shadow-sm); overflow: hidden;
    }

    .category-head {
      display: flex; align-items: center; justify-content: space-between; gap: 8px; padding: 14px 14px; cursor: pointer; min-height: 50px;
      background: color-mix(in srgb, var(--accent) 7%, var(--surface));
    }

    .category-title {
      display: flex; align-items: center; gap: 10px; font-weight: 800; color: var(--text);
    }

    .orange-tag {
      width: 30px; height: 30px; border-radius: 10px; background: rgba(249,115,22,0.18); color: var(--accent);
      display: flex; align-items: center; justify-content: center;
    }

    .product-row {
      display: grid; grid-template-columns: auto 1fr auto; gap: 12px; align-items: flex-start;
      padding: 14px; border-top: 1px solid var(--border); min-height: 72px; position: relative;
    }

    .product-row:first-child { border-top: 1px solid var(--border); }
    .product-row.selected { background: rgba(249,115,22,0.09); }
    .circle-check {
      width: 28px; height: 28px; border-radius: 50%; border: 2px solid var(--accent); background: transparent; color: transparent;
      display: flex; align-items: center; justify-content: center; cursor: pointer; flex-shrink: 0; margin-top: 4px;
    }
    .circle-check.done { background: var(--accent); color: #fff; }
    .row-check { width: 24px; height: 24px; accent-color: var(--accent); margin-top: 6px; }
    .product-name {
      font-size: 15px; font-weight: 800; color: var(--text); line-height: 1.3;
    }
    .product-name.done { text-decoration: line-through; color: var(--text-muted); }
    .sub-info { font-size: 12px; color: var(--text-muted); margin-top: 4px; }
    .meta-row { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 8px; }
    .pill {
      height: 24px; border-radius: 999px; padding: 0 9px; display: inline-flex; align-items: center; gap: 6px;
      font-size: 11px; font-weight: 700; border: 1px solid var(--border); background: var(--surface-2); color: var(--text-muted);
    }

    /* AI STYLES */
    .ai-bubble {
      max-width: 85%; padding: 12px 16px; border-radius: 20px; margin-bottom: 12px; font-size: 14px; line-height: 1.5;
      position: relative; animation: fadeIn .3s ease;
    }
    .ai-bubble.user {
      background: var(--primary); color: #fff; border-bottom-right-radius: 4px; align-self: flex-end; margin-left: auto;
    }
    .ai-bubble.bot {
      background: var(--surface-2); color: var(--text); border-bottom-left-radius: 4px; border: 1px solid var(--border); align-self: flex-start;
    }
    .ai-avatar {
      width: 24px; height: 24px; border-radius: 50%; background: var(--accent); color: #fff;
      display: flex; align-items: center; justify-content: center; font-size: 12px; margin-bottom: 4px;
    }
    .ai-float {
      position: fixed; bottom: calc(var(--nav-h) + 14px + var(--fab-size) + 12px); right: 16px;
      width: 44px; height: 44px; border-radius: 50%; background: linear-gradient(135deg, var(--accent), var(--accent-2));
      color: #fff; display: flex; align-items: center; justify-content: center; font-size: 20px;
      box-shadow: var(--shadow-lg); z-index: 42; cursor: grab; border: none; opacity: 0.85; transition: opacity .2s;
    }
    @media (min-width: 600px) {
      .ai-float { left: 50%; transform: translateX(182px); }
    }
    .ai-float:active { cursor: grabbing; opacity: 1; }
    
    .chat-container {
      display: flex; flex-direction: column; height: 100%;
    }
    .chat-messages {
      flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column;
    }
    .chat-input-area {
      padding: 12px 16px; background: var(--surface); border-top: 1px solid var(--border);
    }
    .typing-indicator {
      display: flex; gap: 4px; padding: 12px 16px; background: var(--surface-2); border-radius: 20px; width: fit-content; margin-bottom: 12px;
    }
    .typing-dot {
      width: 6px; height: 6px; background: var(--text-muted); border-radius: 50%; animation: typing 1.4s infinite ease-in-out;
    }
    .typing-dot:nth-child(2) { animation-delay: .2s; }
    .typing-dot:nth-child(3) { animation-delay: .4s; }
    @keyframes typing { 0%, 80%, 100% { transform: scale(0); } 40% { transform: scale(1); } }
    
    .quick-action-row {
      display: flex; gap: 8px; overflow-x: auto; padding: 8px 0; scrollbar-width: none;
    }
    .quick-action-row::-webkit-scrollbar { display: none; }
    
    .ai-search-toggle {
      width: 32px; height: 32px; border-radius: 8px; border: 1px solid var(--border);
      background: var(--surface-2); color: var(--text-muted); display: flex; align-items: center; justify-content: center; cursor: pointer;
    }
    .ai-search-toggle.on { background: var(--accent); color: #fff; border-color: var(--accent); }
    .price-badge { color: var(--accent); font-weight: 800; }
    .info-btn {
      width: 36px; height: 36px; border: none; border-radius: 12px; background: var(--surface-2); color: var(--primary); cursor: pointer;
      display: flex; align-items: center; justify-content: center; margin-top: 2px;
    }

    .empty-state {
      background: var(--surface); border: 1px dashed var(--border); border-radius: 22px; padding: 28px 18px; text-align: center; color: var(--text-muted);
    }

    .empty-state .big { font-size: 42px; margin-bottom: 10px; display: block; }
    .cta-btn, .primary-btn, .danger-btn, .soft-btn {
      min-height: 44px; border: none; border-radius: 14px; cursor: pointer; font-weight: 800;
      display: inline-flex; align-items: center; justify-content: center; gap: 8px; padding: 0 16px;
    }
    .primary-btn { background: var(--accent); color: #fff; }
    .cta-btn { background: var(--primary); color: #fff; }
    .danger-btn { background: #FEE2E2; color: var(--danger); }
    [data-theme="dark"] .danger-btn { background: #3B1220; }
    .soft-btn { background: var(--surface-2); color: var(--text); border: 1px solid var(--border); }

    .fab {
      position: fixed; bottom: calc(var(--nav-h) + 14px); left: 50%; transform: translateX(175px);
      width: var(--fab-size); height: var(--fab-size); border-radius: 50%; border: none; cursor: pointer; z-index: 42;
      background: linear-gradient(135deg, var(--accent), var(--accent-2)); color: #fff; box-shadow: var(--shadow-lg); font-size: 24px;
    }
    @media (max-width: 479px) {
      .fab { left: auto; right: 16px; transform: none; }
    }

    .bottom-nav {
      bottom: 0; height: var(--nav-h); background: color-mix(in srgb, var(--surface) 94%, transparent); backdrop-filter: blur(18px);
      border-top: 1px solid var(--border); box-shadow: 0 -8px 20px rgba(15,23,42,0.08); display: grid; grid-template-columns: repeat(5, 1fr);
    }

    .nav-btn {
      border: none; background: transparent; color: var(--text-muted); cursor: pointer; padding: 10px 4px 12px;
      display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 5px; font-size: 11px; font-weight: 700;
    }
    .nav-btn i { font-size: 18px; }
    .nav-btn.active { color: var(--accent); }
    .nav-btn.active .nav-pill {
      background: rgba(30,58,138,0.12); color: var(--accent); border-radius: 999px; padding: 8px 12px; display: flex; flex-direction: column; align-items: center; gap: 4px;
      min-width: 62px;
    }
    .nav-pill { display: flex; flex-direction: column; align-items: center; gap: 4px; }

    .drawer-backdrop, .overlay-backdrop, .menu-backdrop { position: fixed; inset: 0; background: rgba(15,23,42,0.42); z-index: 80; display: none; }
    .drawer {
      position: fixed; top: 0; left: 0; bottom: 0; width: min(86vw, 340px); background: var(--surface); z-index: 81;
      transform: translateX(-100%); transition: transform .25s ease; box-shadow: var(--shadow-lg); overflow-y: auto;
    }
    .drawer.open { transform: translateX(0); }
    .drawer-backdrop.show, .overlay-backdrop.show, .menu-backdrop.show { display: block; }

    .drawer-brand {
      background: linear-gradient(135deg, var(--primary), var(--primary-2), var(--accent)); color: #fff; padding: 22px 18px 18px;
    }
    .drawer-brand-top { display: flex; align-items: center; gap: 12px; }
    .drawer-brand img { width: 56px; height: 56px; border-radius: 18px; object-fit: cover; border: 3px solid rgba(255,255,255,0.35); }
    .drawer-illustration {
      margin-top: 14px; border-radius: 20px; padding: 14px; background: rgba(255,255,255,0.12); font-size: 13px;
    }

    .drawer-list { padding: 12px; }
    .drawer-item {
      min-height: 48px; padding: 12px 14px; border-radius: 16px; cursor: pointer; display: flex; align-items: center; gap: 12px;
      color: var(--text); font-weight: 700;
    }
    .drawer-item:active, .drawer-item.active { background: color-mix(in srgb, var(--accent) 10%, var(--surface)); }

    .overlay { position: fixed; inset: 0; z-index: 82; display: none; }
    .overlay.show { display: block; }
    .sheet, .dialog, .fullscreen-sheet, .menu-panel {
      background: var(--surface); color: var(--text); box-shadow: var(--shadow-lg);
    }
    .sheet {
      position: absolute; left: 0; right: 0; bottom: 0; border-radius: 24px 24px 0 0; max-height: 86dvh; overflow: auto;
    }
    .dialog {
      position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%); width: min(92vw, 420px); border-radius: 22px; overflow: hidden;
    }
    .fullscreen-sheet {
      position: absolute; inset: 0; width: min(100vw, var(--app-max)); left: 50%; transform: translateX(-50%); overflow: auto;
    }
    .overlay-header {
      position: sticky; top: 0; z-index: 2; background: var(--surface); border-bottom: 1px solid var(--border);
      padding: 14px 16px; display: flex; align-items: center; justify-content: space-between; gap: 12px;
    }
    .overlay-body { padding: 16px; }
    .overlay-footer {
      position: sticky; bottom: 0; background: var(--surface); border-top: 1px solid var(--border); padding: 12px 16px; display: flex; gap: 10px;
    }
    .overlay-footer > * { flex: 1; }

    .menu-panel {
      position: fixed; top: 66px; right: max(14px, calc(50vw - 240px + 14px)); width: min(86vw, 260px); border-radius: 18px; overflow: hidden; z-index: 83;
      border: 1px solid var(--border);
    }
    @media (max-width: 479px) {
      .menu-panel { right: 12px; }
    }
    .menu-panel.hidden { display: none; }

    .field { margin-bottom: 16px; }
    .field label {
      display: flex; align-items: center; justify-content: space-between; gap: 8px; font-size: 12px; color: var(--text-muted); font-weight: 800; letter-spacing: .06em; text-transform: uppercase; margin-bottom: 8px;
    }
    .field input, .field textarea, .field select {
      width: 100%; min-height: 46px; border-radius: 14px; border: 1px solid var(--border); background: var(--surface-2); color: var(--text); padding: 12px 14px; outline: none;
    }
    .field textarea { min-height: 100px; resize: vertical; }

    .pick-grid, .toggle-row, .action-grid { display: flex; flex-wrap: wrap; gap: 8px; }
    .pick {
      min-height: 36px; padding: 0 12px; border-radius: 999px; border: 1px solid var(--border); background: var(--surface-2); color: var(--text-muted);
      display: inline-flex; align-items: center; gap: 8px; cursor: pointer; font-size: 13px; font-weight: 700;
    }
    .pick.on { background: var(--primary); color: #fff; border-color: var(--primary); }
    .pick.orange.on { background: var(--accent); border-color: var(--accent); }

    .qty-wrap { display: grid; grid-template-columns: auto 1fr auto 1fr; gap: 10px; align-items: center; }
    .qty-btn {
      width: 42px; height: 42px; border-radius: 14px; border: none; background: var(--surface-2); color: var(--primary); cursor: pointer; font-weight: 800;
    }

    .total-strip {
      padding: 14px; border-radius: 18px; background: rgba(249,115,22,0.12); color: var(--accent); font-weight: 800; display: flex; align-items: center; justify-content: space-between;
    }

    .switch {
      width: 54px; height: 30px; border-radius: 999px; background: var(--border); position: relative; cursor: pointer; border: none;
    }
    .switch::after {
      content: ''; position: absolute; top: 4px; left: 4px; width: 22px; height: 22px; border-radius: 50%; background: #fff; transition: .2s ease;
      box-shadow: 0 2px 8px rgba(0,0,0,.18);
    }
    .switch.on { background: var(--accent); }
    .switch.on::after { transform: translateX(24px); }

    .settings-row, .simple-row {
      min-height: 52px; display: flex; align-items: center; justify-content: space-between; gap: 12px; padding: 12px 0; border-bottom: 1px solid var(--border);
    }

    .bulk-bar {
      position: fixed; bottom: calc(var(--nav-h) + 8px); left: 50%; transform: translateX(-50%); width: min(100vw, var(--app-max)); z-index: 41;
      padding: 0 14px; display: none;
    }
    .bulk-card {
      background: var(--surface); border: 1px solid var(--border); border-radius: 18px; box-shadow: var(--shadow-lg); padding: 10px;
      display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px;
    }
    .bulk-action {
      min-height: 42px; border: none; border-radius: 12px; background: var(--surface-2); color: var(--text); font-size: 11px; font-weight: 800; cursor: pointer;
      display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px;
    }

    .toast-wrap {
      position: fixed; top: 14px; left: 50%; transform: translateX(-50%); width: min(92vw, 420px); z-index: 95; display: flex; flex-direction: column; gap: 8px;
      pointer-events: none;
    }
    .toast {
      background: #111827; color: #fff; border-radius: 14px; padding: 12px 14px; font-size: 14px; box-shadow: var(--shadow-md); pointer-events: auto;
    }
    .toast.success { background: var(--success); }
    .toast.warning { background: var(--warning); }
    .toast.error { background: var(--danger); }

    .voice-panel {
      position: fixed; left: 50%; transform: translateX(-50%); bottom: calc(var(--nav-h) + 16px); width: min(92vw, 420px); z-index: 86;
      background: var(--surface); border: 1px solid var(--border); border-radius: 20px; box-shadow: var(--shadow-lg); padding: 18px; display: none;
    }
    .voice-panel.show { display: block; }
    .voice-bars { display: flex; align-items: end; justify-content: center; gap: 4px; height: 40px; margin: 10px 0; }
    .voice-bars span { width: 5px; background: var(--accent); border-radius: 999px; animation: wave .6s infinite alternate; }
    .voice-bars span:nth-child(2){animation-delay:.1s}.voice-bars span:nth-child(3){animation-delay:.2s}.voice-bars span:nth-child(4){animation-delay:.3s}.voice-bars span:nth-child(5){animation-delay:.15s}
    @keyframes wave { from { height: 8px; } to { height: 30px; } }

    .install-banner {
      position: fixed; left: 50%; transform: translateX(-50%); bottom: calc(var(--nav-h) + 10px); width: min(92vw, 430px); z-index: 43;
      background: linear-gradient(135deg, var(--primary), var(--accent)); color: #fff; border-radius: 20px; box-shadow: var(--shadow-lg); padding: 14px; display: none;
    }
    .install-banner.show { display: block; }

    .hide { display: none !important; }

    @media print {
      .frame-fixed, .fab, .bulk-bar, .drawer, .overlay, .voice-panel, .install-banner, .toast-wrap { display: none !important; }
      body { background: #fff !important; }
      .app-shell { max-width: none !important; box-shadow: none !important; border-radius: 0 !important; }
      .main-content { padding: 0 !important; }
    }
  </style>
</head>
<body>
  <div class="desktop-wrap">
    <div class="app-shell" id="appShell">
      <header class="top-header frame-fixed">
        <div class="top-row">
          <div class="left-pack">
            <button class="icon-btn" onclick="toggleDrawer(true)"><i class="fas fa-bars"></i></button>
            <img class="logo-thumb" src="https://i.ibb.co/rJs39Vb/Flat-shopping-bag-logo-Hassaan-202607061240.jpg" alt="HV Shopping List">
          </div>
          <button class="current-list-btn" onclick="openListSwitcher()">
            <span class="list-title" id="currentListLabel">Loading...</span>
            <i class="fas fa-chevron-down small"></i>
          </button>
          <div class="right-pack">
            <button class="icon-btn" onclick="handleMic('smart')"><i class="fas fa-microphone"></i></button>
            <button class="icon-btn" onclick="toggleMoreMenu(true)"><i class="fas fa-ellipsis-vertical"></i></button>
          </div>
        </div>
        <div class="quick-add-area">
          <div class="quick-add-wrap">
            <i class="fas fa-plus-circle leading"></i>
            <input id="quickAddInput" class="quick-add-input" type="text" placeholder="Enter product name..." onkeydown="handleQuickAddKey(event)">
            <button class="mini-btn" onclick="handleMic('quick-add')" oncontextmenu="event.preventDefault(); handleMic('smart-voice-add')"><i class="fas fa-microphone"></i></button>
            <button class="mini-btn" onclick="openHistoryPanel()"><i class="far fa-clock"></i></button>
          </div>
          <div id="quickAddCategoryDropdown" class="quick-dropdown hidden"></div>
        </div>
      </header>

      <div id="offlineBanner" class="offline-banner frame-fixed"><i class="fas fa-wifi-slash"></i> Offline mode active — your data is safe locally.</div>

      <main id="mainContent" class="main-content"></main>

      <button id="aiFloatBtn" class="ai-float" onclick="openAIChat()"><i class="fas fa-wand-magic-sparkles"></i></button>
      <button id="fabBtn" class="fab" onclick="openProductModal()"><i class="fas fa-plus"></i></button>

      <div id="bulkBar" class="bulk-bar"></div>

      <nav class="bottom-nav frame-fixed" id="bottomNav"></nav>
    </div>
  </div>

  <div id="drawerBackdrop" class="drawer-backdrop" onclick="toggleDrawer(false)"></div>
  <aside id="drawer" class="drawer"></aside>

  <div id="menuBackdrop" class="menu-backdrop" onclick="toggleMoreMenu(false)"></div>
  <div id="moreMenu" class="menu-panel hidden"></div>

  <div id="overlayBackdrop" class="overlay-backdrop" onclick="closeOverlay()"></div>
  <div id="overlayRoot" class="overlay"></div>

  <div id="voicePanel" class="voice-panel">
    <div style="display:flex;align-items:center;justify-content:space-between;gap:10px;">
      <strong><i class="fas fa-microphone" style="color:var(--accent)"></i> Listening...</strong>
      <button class="soft-btn" style="min-height:36px" onclick="stopVoiceRecognition()">Stop</button>
    </div>
    <div class="voice-bars"><span></span><span></span><span></span><span></span><span></span></div>
    <div id="voiceHint" class="small muted">Speak now...</div>
    <div id="voiceTranscript" style="margin-top:10px;font-weight:700;"></div>
  </div>

  <div id="installBanner" class="install-banner"></div>
  <div id="toastWrap" class="toast-wrap"></div>
  <input id="importFileInput" type="file" accept="application/json" class="hide">

  <script>
    const STORAGE_KEY = 'hv_shop_state_v4';
    const LEGACY_KEYS = {
      PRODUCTS: 'hv_products',
      CATEGORIES: 'hv_categories',
      TAGS: 'hv_tags',
      LABELS: 'hv_labels',
      PREFS: 'hv_prefs'
    };

    const DEFAULT_LIST_TYPES = [
      { id: 'shopping', name: 'Shopping List', icon: '🛒', isDefault: true },
      { id: 'pantry', name: 'Pantry List', icon: '🏠', isDefault: true },
      { id: 'todo', name: 'To-Do List', icon: '✅', isDefault: true }
    ];

    const DEFAULT_TAGS = [
      { id: 'urgent', name: 'Urgent', color: '#EF4444', icon: '🔴', isDefault: true },
      { id: 'buy-soon', name: 'Buy Soon', color: '#F59E0B', icon: '🟡', isDefault: true },
      { id: 'normal', name: 'Normal', color: '#16A34A', icon: '🟢', isDefault: true },
      { id: 'favorite', name: 'Favorite', color: '#F97316', icon: '⭐', isDefault: true }
    ];

    const UNIT_OPTIONS = ['None', 'kg', 'gram', 'pcs', 'dozen', 'meter', 'litre', 'packet', 'box', 'bag', 'bottle', 'custom'];
    const COLOR_CHOICES = ['#F97316', '#1E3A8A', '#10B981', '#8B5CF6', '#EF4444', '#F59E0B', '#0EA5E9', '#EC4899'];
    const LOGO_URL = 'https://i.ibb.co/rJs39Vb/Flat-shopping-bag-logo-Hassaan-202607061240.jpg';

    let state = loadState();
    let ui = {
      view: 'home',
      filters: { tagId: 'all', labelId: 'all', search: '' },
      productScope: { mode: 'active', value: null },
      bulkMode: false,
      selectedIds: new Set(),
      collapsedCategories: {},
      listTab: 'tags',
      notesTarget: false,
      currentRecognition: null,
      deferredPrompt: null,
      quickAddPending: null,
      longPressTimer: null,
      aiSearch: false,
      aiSearchResults: null
    };

    document.addEventListener('DOMContentLoaded', initApp);

    function initApp() {
      cleanupRecycleBin();
      ensureState();
      applyTheme();
      bindGlobals();
      registerServiceWorker();
      initInstallPrompt();
      initOfflineDetection();
      renderApp();
      checkStorageUsage();
    }

    function bindGlobals() {
      document.getElementById('importFileInput').addEventListener('change', importJSONFile);
      document.addEventListener('click', (e) => {
        const menu = document.getElementById('moreMenu');
        if (!menu.contains(e.target) && !e.target.closest('.fa-ellipsis-vertical')) toggleMoreMenu(false);
        if (!e.target.closest('.quick-add-area')) {
          ui.quickAddPending = null;
          renderQuickAddDropdown();
        }
      });
      initDraggableAI();
    }

    function initDraggableAI() {
      const btn = document.getElementById('aiFloatBtn');
      let isDragging = false;
      let startY;
      let startBottom;

      btn.addEventListener('mousedown', start);
      btn.addEventListener('touchstart', start, { passive: false });

      function start(e) {
        if (ui.view === 'ai') return;
        isDragging = true;
        startY = e.type === 'touchstart' ? e.touches[0].clientY : e.clientY;
        const style = window.getComputedStyle(btn);
        startBottom = parseInt(style.bottom);
        document.addEventListener('mousemove', move);
        document.addEventListener('touchmove', move, { passive: false });
        document.addEventListener('mouseup', end);
        document.addEventListener('touchend', end);
      }

      function move(e) {
        if (!isDragging) return;
        if (e.cancelable) e.preventDefault();
        const y = e.type === 'touchmove' ? e.touches[0].clientY : e.clientY;
        const delta = startY - y;
        let newBottom = startBottom + delta;
        // Keep in bounds
        newBottom = Math.max(var_nav_h + 10, Math.min(window.innerHeight - 100, newBottom));
        btn.style.bottom = newBottom + 'px';
      }

      function end() {
        isDragging = false;
        document.removeEventListener('mousemove', move);
        document.removeEventListener('touchmove', move);
      }
    }
    const var_nav_h = 76; // CSS variable fallback

    function safeGet(key, fallback) {
      try {
        const raw = localStorage.getItem(key);
        return raw ? JSON.parse(raw) : fallback;
      } catch (e) {
        return fallback;
      }
    }

    function saveState() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
      applyTheme();
      renderApp();
    }

    function uid(prefix = 'id') {
      return `${prefix}_${Math.random().toString(36).slice(2, 10)}_${Date.now().toString(36)}`;
    }

    function createDefaultState() {
      const firstListId = uid('list');
      return {
        listTypes: [...DEFAULT_LIST_TYPES],
        lists: [{ id: firstListId, typeId: 'shopping', name: '111.CURRENT', emoji: '❤️', color: '#F97316', createdAt: Date.now(), order: 0 }],
        products: [],
        categories: [],
        tags: [...DEFAULT_TAGS],
        labels: [],
        recycleBin: [],
        aiSettings: {
          enabled: false,
          apiKey: '',
          model: 'llama-3.3-70b-versatile',
          language: 'english',
          autoFeatures: {
            autoCategory: true,
            nameCorrection: true,
            priceSuggestion: true,
            duplicateDetection: false
          },
          privacyAccepted: false
        },
        aiChatHistory: [],
        aiCache: {},
        settings: {
          theme: 'light',
          activeListId: firstListId,
          currency: 'PKR',
          voiceEnabled: true,
          voiceLang: 'en-US'
        }
      };
    }

    function loadState() {
      const current = safeGet(STORAGE_KEY, null);
      if (current) return normalizeState(current);
      const migrated = migrateLegacyState();
      return migrated || createDefaultState();
    }

    function normalizeState(raw) {
      const base = createDefaultState();
      return {
        listTypes: Array.isArray(raw.listTypes) && raw.listTypes.length ? raw.listTypes : base.listTypes,
        lists: Array.isArray(raw.lists) && raw.lists.length ? raw.lists : base.lists,
        products: Array.isArray(raw.products) ? raw.products : [],
        categories: Array.isArray(raw.categories) ? raw.categories : [],
        tags: Array.isArray(raw.tags) && raw.tags.length ? raw.tags : base.tags,
        labels: Array.isArray(raw.labels) ? raw.labels : [],
        recycleBin: Array.isArray(raw.recycleBin) ? raw.recycleBin : [],
        aiSettings: { ...base.aiSettings, ...(raw.aiSettings || {}) },
        aiChatHistory: Array.isArray(raw.aiChatHistory) ? raw.aiChatHistory.slice(-50) : [],
        aiCache: raw.aiCache || {},
        settings: { ...base.settings, ...(raw.settings || {}) }
      };
    }

    function migrateLegacyState() {
      const legacyProducts = safeGet(LEGACY_KEYS.PRODUCTS, null);
      if (!legacyProducts || !Array.isArray(legacyProducts)) return null;

      const legacyCategories = safeGet(LEGACY_KEYS.CATEGORIES, []);
      const legacyTags = safeGet(LEGACY_KEYS.TAGS, DEFAULT_TAGS);
      const legacyLabels = safeGet(LEGACY_KEYS.LABELS, []);
      const legacyPrefs = safeGet(LEGACY_KEYS.PREFS, {});

      const listId = uid('list');
      const migrated = {
        listTypes: [...DEFAULT_LIST_TYPES],
        lists: [{ id: listId, typeId: 'shopping', name: 'My Products', emoji: '🛍️', color: '#F97316', createdAt: Date.now(), order: 0 }],
        products: [],
        categories: Array.isArray(legacyCategories) ? legacyCategories.map((c, i) => ({
          id: c.id || uid('cat'),
          name: c.name || `Category ${i + 1}`,
          color: c.color || COLOR_CHOICES[i % COLOR_CHOICES.length],
          createdAt: c.createdAt || Date.now(),
          order: c.order ?? i
        })) : [],
        tags: Array.isArray(legacyTags) && legacyTags.length ? legacyTags.map((t, i) => ({
          id: t.id || uid('tag'),
          name: t.name || `Tag ${i + 1}`,
          color: t.color || COLOR_CHOICES[i % COLOR_CHOICES.length],
          icon: t.icon || '🏷️',
          isDefault: !!t.isDefault
        })) : [...DEFAULT_TAGS],
        labels: Array.isArray(legacyLabels) ? legacyLabels.map((l, i) => ({
          id: l.id || uid('label'),
          name: l.name || `Label ${i + 1}`,
          color: l.color || COLOR_CHOICES[(i + 3) % COLOR_CHOICES.length],
          emoji: l.emoji || '🏷️',
          createdAt: l.createdAt || Date.now()
        })) : [],
        recycleBin: [],
        settings: {
          theme: legacyPrefs.theme || 'light',
          activeListId: listId,
          currency: 'PKR',
          voiceEnabled: legacyPrefs.voiceEnabled !== false,
          voiceLang: legacyPrefs.voiceLang || 'en-US'
        }
      };

      legacyProducts.forEach((p, index) => {
        const quantityText = (p.quantityNeeded || '').toString().trim();
        const parsedQty = parseFloat(quantityText);
        let unit = 'pcs';
        if (quantityText) {
          const unitGuess = quantityText.replace(/[0-9.\s]/g, '').trim();
          if (unitGuess) unit = unitGuess;
        }
        const mapped = {
          id: p.id || uid('prod'),
          listId,
          name: p.name || `Product ${index + 1}`,
          categoryIds: Array.isArray(p.categories) ? p.categories : [],
          tagIds: Array.isArray(p.tags) ? p.tags : [],
          labelIds: Array.isArray(p.labels) ? p.labels : [],
          quantity: Number.isFinite(parsedQty) ? parsedQty : 1,
          unit: unit || 'pcs',
          unitPrice: 0,
          supplier: p.supplier || '',
          notes: p.notes || '',
          isCompleted: !!p.completed,
          isPinned: !!p.pinned,
          createdAt: p.createdAt || Date.now(),
          completedAt: p.completedAt || null
        };
        if (p.deletedAt) {
          migrated.recycleBin.push({ id: uid('bin'), entity: 'product', data: mapped, deletedAt: p.deletedAt, sourceListId: listId });
        } else {
          migrated.products.push(mapped);
        }
      });

      localStorage.setItem(STORAGE_KEY, JSON.stringify(migrated));
      return migrated;
    }

    function ensureState() {
      if (!state.listTypes.length) state.listTypes = [...DEFAULT_LIST_TYPES];
      if (!state.tags.length) state.tags = [...DEFAULT_TAGS];
      if (!state.lists.length) {
        const newListId = uid('list');
        state.lists = [{ id: newListId, typeId: 'shopping', name: '111.CURRENT', emoji: '❤️', color: '#F97316', createdAt: Date.now(), order: 0 }];
        state.settings.activeListId = newListId;
      }
      if (!getActiveList()) state.settings.activeListId = state.lists[0]?.id || null;
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    }

    function cleanupRecycleBin() {
      const cutoff = Date.now() - (30 * 24 * 60 * 60 * 1000);
      state.recycleBin = state.recycleBin.filter(item => item.deletedAt > cutoff);
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    }

    function getActiveList() {
      return state.lists.find(l => l.id === state.settings.activeListId) || state.lists[0] || null;
    }

    function displayListName(list) {
      if (!list) return 'No List';
      return `${list.emoji || '📋'} ${list.name}`;
    }

    function getListType(typeId) {
      return state.listTypes.find(t => t.id === typeId);
    }

    function getCategory(catId) {
      return state.categories.find(c => c.id === catId);
    }

    function getTag(tagId) {
      return state.tags.find(t => t.id === tagId);
    }

    function getLabel(labelId) {
      return state.labels.find(l => l.id === labelId);
    }

    function getScopeProducts() {
      if (ui.productScope.mode === 'all') return [...state.products];
      if (ui.productScope.mode === 'list' && ui.productScope.value) return state.products.filter(p => p.listId === ui.productScope.value);
      const active = getActiveList();
      return active ? state.products.filter(p => p.listId === active.id) : [];
    }

    function filterProducts(products, searchText = ui.filters.search) {
      let list = [...products];
      if (ui.filters.tagId !== 'all') list = list.filter(p => p.tagIds.includes(ui.filters.tagId));
      if (ui.filters.labelId !== 'all') list = list.filter(p => p.labelIds.includes(ui.filters.labelId));
      if (searchText && searchText.trim()) {
        const q = searchText.trim().toLowerCase();
        list = list.filter(p => {
          const listName = state.lists.find(l => l.id === p.listId)?.name || '';
          const catNames = (p.categoryIds || []).map(id => getCategory(id)?.name || '').join(' ');
          return [p.name, p.supplier, p.notes, listName, catNames].join(' ').toLowerCase().includes(q);
        });
      }
      return list.sort((a, b) => {
        if (a.isPinned !== b.isPinned) return a.isPinned ? -1 : 1;
        if (a.isCompleted !== b.isCompleted) return a.isCompleted ? 1 : -1;
        return (a.name || '').localeCompare(b.name || '');
      });
    }

    function getGlobalSearchResults() {
      if (ui.aiSearch && ui.aiSearchResults) return ui.aiSearchResults;
      return filterProducts(state.products, ui.filters.search).slice(0, 20);
    }

    function calcProductTotal(product) {
      return (Number(product.quantity) || 0) * (Number(product.unitPrice) || 0);
    }

    function formatMoney(value) {
      return `Rs. ${Number(value || 0).toLocaleString('en-PK')}`;
    }

    function todayString() {
      return new Date().toLocaleDateString('en-PK', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });
    }

    function applyTheme() {
      document.documentElement.setAttribute('data-theme', state.settings.theme || 'light');
    }

    function setView(view, opts = {}) {
      ui.view = view;
      if (opts.scopeMode) ui.productScope = { mode: opts.scopeMode, value: opts.scopeValue || null };
      if (opts.clearSearch) ui.filters.search = '';
      toggleDrawer(false);
      toggleMoreMenu(false);
      renderApp();
    }

    function renderApp() {
      document.getElementById('currentListLabel').textContent = displayListName(getActiveList());
      document.getElementById('mainContent').innerHTML = renderView();
      document.getElementById('fabBtn').style.display = ['home', 'products'].includes(ui.view) ? 'block' : 'none';
      renderBottomNav();
      renderDrawer();
      renderMoreMenu();
      renderBulkBar();
      renderQuickAddDropdown();
      renderInstallBanner();
      attachLongPressHandlers();
    }

    function renderView() {
      switch (ui.view) {
        case 'products': return renderProductsView();
        case 'ai': return renderAiView();
        case 'categories': return renderCategoriesView();
        case 'tags': return renderTagsView();
        case 'settings': return renderSettingsView();
        case 'bin': return renderBinView();
        default: return renderHomeView();
      }
    }

    function renderAiView() {
      if (!state.aiSettings.enabled || !state.aiSettings.apiKey) {
        return `
          <div class="view-card" style="text-align:center;padding:40px 20px;">
            <div style="font-size:50px;margin-bottom:20px;">✨</div>
            <h2 style="font-size:22px;font-weight:800;margin-bottom:12px;">AI Assistant</h2>
            <p class="muted" style="margin-bottom:24px;">Unlock powerful smart features like auto-categorization, reports, and shopping suggestions using Groq AI.</p>
            <button class="primary-btn" onclick="setView('settings')"><i class="fas fa-key"></i> Setup API Key</button>
            <div class="small muted" style="margin-top:16px;">Get a free key at console.groq.com</div>
          </div>
        `;
      }

      if (!state.aiSettings.privacyAccepted) {
        return `
          <div class="view-card" style="text-align:center;padding:30px 20px;">
            <div style="font-size:40px;margin-bottom:16px;">🛡️</div>
            <h3 style="font-weight:800;margin-bottom:12px;">Privacy Notice</h3>

        ${ui.filters.search ? `

            <div style="margin-top:6px;">Try changing filters or add a new product to this list.</div>
          </div>
        `}
      `;
    }

    function buildCategoryGroups(products) {
      const map = new Map();
      products.forEach(product => {
        const primaryCatId = product.categoryIds && product.categoryIds.length ? product.categoryIds[0] : 'uncategorized';
        if (!map.has(primaryCatId)) map.set(primaryCatId, []);
        map.get(primaryCatId).push(product);
      });
      const rows = [...map.entries()].map(([catId, items]) => ({
        catId,
        items,
        category: catId === 'uncategorized' ? { id: 'uncategorized', name: 'Uncategorized', color: '#94A3B8' } : getCategory(catId)
      }));
      return rows.sort((a, b) => {
        if (a.catId === 'uncategorized') return 1;
        if (b.catId === 'uncategorized') return -1;
        return (a.category?.name || '').localeCompare(b.category?.name || '');
      });
    }

    function renderCategoryGroup(group) {
      const collapseKey = `${ui.productScope.mode}_${group.catId}`;
      const collapsed = !!ui.collapsedCategories[collapseKey];
      return `
        <div class="category-group">
          <div class="category-head" onclick="toggleCategoryCollapse('${collapseKey}')">
            <div class="category-title">
              <span class="orange-tag"><i class="fas fa-tag"></i></span>
              <span>${escapeHtml(group.category?.name || 'Category')}</span>
            </div>
            <div style="display:flex;align-items:center;gap:10px;">
              <span class="pill">${group.items.length}</span>
              <i class="fas fa-chevron-${collapsed ? 'down' : 'up'} muted"></i>
            </div>
          </div>
          ${collapsed ? '' : group.items.map(renderProductRow).join('')}
        </div>
      `;
    }

      return `
        <div class="product-row ${selected ? 'selected' : ''}" data-row-id="${product.id}">

            <input class="row-check" type="checkbox" ${selected ? 'checked' : ''} onchange="toggleBulkSelect('${product.id}')">

            <div class="meta-row">

      return (product.tagIds || []).map(id => {

        return tag ? `<span class="pill"><span class="dot" style="background:${tag.color}"></span>${escapeHtml(tag.name)}</span>` : '';
      }).join('');
    }

    function renderProductLabelPills(product) {
      return (product.labelIds || []).map(id => {
        const label = getLabel(id);
        return label ? `<span class="pill">${escapeHtml(label.emoji || '🏷️')} ${escapeHtml(label.name)}</span>` : '';
      }).join('');

    function renderProductCategoryPills(product) {
      return (product.categoryIds || []).slice(0, 2).map(id => {
        const cat = getCategory(id);
        return cat ? `<span class="pill"><span class="dot" style="background:${cat.color}"></span>${escapeHtml(cat.name)}</span>` : '';
      }).join('');
    }

    function buildProductSubInfo(product) {
      const qty = Number(product.quantity || 0);
      const qtyText = `${qty % 1 === 0 ? qty.toFixed(0) : qty} ${product.unit && product.unit !== 'None' ? product.unit : ''}`.trim();
      const priceText = Number(product.unitPrice) ? formatMoney(product.unitPrice) : 'No price';
      return `${qtyText || '1 pcs'} • ${priceText}${product.supplier ? ` • ${product.supplier}` : ''}`;
    }

    function openProductModal(productId = '') {
      const product = state.products.find(p => p.id === productId) || {
        id: '', listId: getActiveList()?.id || '', name: '', categoryIds: [], tagIds: [], labelIds: [], quantity: 1, unit: 'pcs', unitPrice: 0, supplier: '', notes: '', isCompleted: false, isPinned: false
      };
      const total = calcProductTotal(product);
      openOverlay(`
        <div class="overlay-header"><strong>${productId ? 'Product Detail' : 'New Product'}</strong><button class="icon-btn" style="width:36px;height:36px" onclick="closeOverlay()"><i class="fas fa-times"></i></button></div>
        <div class="overlay-body">
          <div class="field">
            <label>Product Name <button class="mini-btn" title="Translate" onclick="aiTranslateName()"><i class="fas fa-globe"></i></button></label>
            <input id="productNameInput" value="${escapeHtml(product.name)}" placeholder="LED Bulb" onblur="if(!this.value)return; aiSuggestCategory(this.value); aiFixNameSpelling(this)">
          </div>

          <div class="field">
            <label>Quantity</label>
            <div class="qty-wrap">
              <button class="qty-btn" onclick="stepQty(-1)">−</button>
              <input id="productQtyInput" type="number" min="0" step="0.1" value="${Number(product.quantity || 1)}" oninput="updateProductTotalPreview()">
              <button class="qty-btn" onclick="stepQty(1)">+</button>
              <select id="productUnitSelect" onchange="updateProductTotalPreview()">${UNIT_OPTIONS.map(unit => `<option value="${unit}" ${product.unit === unit ? 'selected' : ''}>${unit}</option>`).join('')}</select>
            </div>
          </div>

          <div class="field">
            <label>Categories <button class="mini-btn" type="button" onclick="openCategoryModal()"><i class="fas fa-plus"></i></button></label>
            <div class="pick-grid" id="productCategoryPicks">
              ${state.categories.map(cat => `<button class="pick ${product.categoryIds.includes(cat.id) ? 'on' : ''}" type="button" data-role="product-category" data-id="${cat.id}" onclick="togglePick(this)"><span class="dot" style="background:${cat.color}"></span>${escapeHtml(cat.name)}</button>`).join('') || '<span class="small muted">No categories yet. Tap + to create one.</span>'}
            </div>
          </div>

          <div class="field">
            <label>Unit Price (${escapeHtml(state.settings.currency || 'PKR')}) <button class="mini-btn" title="AI Suggest Price" onclick="aiSuggestPrice(document.getElementById('productNameInput').value)"><i class="fas fa-wand-sparkles"></i></button></label>
            <input id="productPriceInput" type="number" min="0" step="0.01" value="${Number(product.unitPrice || 0)}" placeholder="200" oninput="updateProductTotalPreview()">
          </div>

          <div class="total-strip"><span>List Total</span><strong id="productTotalPreview">${formatMoney(total)}</strong></div>

          <div class="field" style="margin-top:16px;">
            <label>Tags</label>
            <div class="pick-grid" id="productTagPicks">

            </div>
          </div>

          <div class="field">
            <label>Labels <button class="mini-btn" type="button" onclick="openTagModal('label')"><i class="fas fa-plus"></i></button></label>
            <div class="pick-grid" id="productLabelPicks">
              ${state.labels.map(label => `<button class="pick ${product.labelIds.includes(label.id) ? 'on' : ''}" type="button" data-role="product-label" data-id="${label.id}" onclick="togglePick(this)">${escapeHtml(label.emoji || '🏷️')} ${escapeHtml(label.name)}</button>`).join('') || '<span class="small muted">No labels yet.</span>'}
            </div>
          </div>

          <div class="field"><label>Supplier</label><input id="productSupplierInput" value="${escapeHtml(product.supplier || '')}" placeholder="Ali Traders"></div>
          <div class="field"><label>Notes <button class="mini-btn" type="button" onclick="handleMic('notes')"><i class="fas fa-microphone"></i></button></label><textarea id="productNotesInput" placeholder="9W white bulbs">${escapeHtml(product.notes || '')}</textarea></div>
          <div class="field">
            <div class="settings-row" style="border-bottom:none;padding:0;">
              <div>
                <div style="font-weight:800;">Pin to top</div>
                <div class="small muted">Pinned items stay above others</div>
              </div>
              <button id="pinSwitch" class="switch ${product.isPinned ? 'on' : ''}" onclick="this.classList.toggle('on')"></button>
            </div>
          </div>
          <input type="hidden" id="productEditingId" value="${productId}">
        </div>
        <div class="overlay-footer">
          ${productId ? `<button class="danger-btn" onclick="closeOverlay();deleteProduct('${productId}')"><i class="fas fa-trash"></i> Delete</button>` : `<button class="soft-btn" onclick="closeOverlay()">Cancel</button>`}
          <button class="primary-btn" onclick="saveProductModal()"><i class="fas fa-floppy-disk"></i> Save</button>
        </div>
      `, 'fullscreen-sheet');
    }

    function renderQuickAddDropdown() {
      const box = document.getElementById('quickAddCategoryDropdown');
      if (!ui.quickAddPending) {
        box.classList.add('hidden');
        box.innerHTML = '';
        return;
      }
      box.classList.remove('hidden');
      box.innerHTML = `
        ${state.categories.map(cat => `<div class="drop-row" onclick="quickAddWithCategory('${cat.id}')"><span><span class="dot" style="background:${cat.color};margin-right:8px;"></span>${escapeHtml(cat.name)}</span><span class="small muted">Add here</span></div>`).join('')}
        <div class="drop-row" onclick="quickAddWithCategory('')"><span><i class="fas fa-inbox" style="margin-right:8px;color:var(--text-muted)"></i>Uncategorized</span><span class="small muted">Instant add</span></div>
      `;
    }

    function handleQuickAddKey(event) {
      if (event.key !== 'Enter') return;
      const name = document.getElementById('quickAddInput').value.trim();
      if (!name) return;
      if (ui.quickAddPending) {
        quickAddWithCategory('');
      } else {
        if (state.categories.length) {
          ui.quickAddPending = name;
          renderQuickAddDropdown();
        } else {
          createQuickProduct(name, []);
        }
      }
    }

    function quickAddWithCategory(catId) {
      const name = ui.quickAddPending || document.getElementById('quickAddInput').value.trim();
      if (!name) return;
      createQuickProduct(name, catId ? [catId] : []);
    }

    function createQuickProduct(name, categoryIds) {
      const active = getActiveList();
      if (!active) return showToast('Create a list first.', 'warning');
      const product = {
        id: uid('prod'),
        listId: active.id,
        name,
        categoryIds,
        tagIds: [],
        labelIds: [],
        quantity: 1,
        unit: 'pcs',
        unitPrice: 0,
        supplier: '',
        notes: '',
        isCompleted: false,
        isPinned: false,
        createdAt: Date.now(),
        completedAt: null
      };
      state.products.push(product);
      ui.quickAddPending = null;
      document.getElementById('quickAddInput').value = '';
      saveState();
      showToast(`Added: ${name}`, 'success');
    }

    function setGlobalSearch(value) {
      ui.filters.search = value;
      if (ui.aiSearch) {
        clearTimeout(ui.aiSearchTimer);
        ui.aiSearchTimer = setTimeout(() => updateGlobalSearchResultsWithAI(), 600);
      }
      renderApp();
    }

    function setTagFilter(tagId, fromHome) {
      ui.filters.tagId = tagId;
      if (fromHome) {
        ui.productScope = { mode: 'all', value: null };
        ui.view = 'products';
      }
      renderApp();
    }

    function setLabelFilter(labelId, fromHome) {
      ui.filters.labelId = labelId;
      if (fromHome) {
        ui.productScope = { mode: 'all', value: null };
        ui.view = 'products';
      }
      renderApp();
    }

    function openGlobalTag(tagId) {
      ui.filters.tagId = tagId;
      ui.filters.labelId = 'all';
      ui.productScope = { mode: 'all', value: null };
      setView('products');
    }

    function switchToList(listId) {
      state.settings.activeListId = listId;
      ui.productScope = { mode: 'active', value: null };
      ui.view = 'products';
      saveState();
    }

    function openProductFromSearch(productId) {
      const product = state.products.find(p => p.id === productId);
      if (!product) return;
      state.settings.activeListId = product.listId;
      ui.productScope = { mode: 'active', value: null };
      saveState();
      openProductModal(productId);
    }

    function quickAddAgain(productId) {
      const source = state.products.find(p => p.id === productId);
      if (!source) return;
      const copy = { ...source, id: uid('prod'), createdAt: Date.now(), isCompleted: false, completedAt: null };
      state.products.push(copy);
      saveState();
      closeOverlay();
      showToast(`${source.name} added again`, 'success');
    }

    function toggleCategoryCollapse(key) {
      ui.collapsedCategories[key] = !ui.collapsedCategories[key];
      renderApp();
    }

    function toggleProductComplete(productId) {
      const product = state.products.find(p => p.id === productId);
      if (!product) return;
      product.isCompleted = !product.isCompleted;
      product.completedAt = product.isCompleted ? Date.now() : null;
      saveState();
    }

    function attachLongPressHandlers() {
      document.querySelectorAll('[data-row-id]').forEach(row => {
        row.onpointerdown = () => {
          clearTimeout(ui.longPressTimer);
          ui.longPressTimer = setTimeout(() => {
            if (!ui.bulkMode) ui.bulkMode = true;
            const id = row.getAttribute('data-row-id');
            ui.selectedIds.add(id);
            renderApp();
          }, 500);
        };
        row.onpointerup = row.onpointerleave = row.onpointercancel = () => clearTimeout(ui.longPressTimer);
      });
    }

    function toggleBulkSelect(productId) {
      if (ui.selectedIds.has(productId)) ui.selectedIds.delete(productId);
      else ui.selectedIds.add(productId);
      if (!ui.selectedIds.size) ui.bulkMode = false;
      renderApp();
    }

    function clearBulkMode() {
      ui.bulkMode = false;
      ui.selectedIds.clear();
      renderApp();
    }

    function bulkComplete() {
      state.products.forEach(p => {
        if (ui.selectedIds.has(p.id)) {
          p.isCompleted = true;
          p.completedAt = Date.now();
        }
      });
      clearBulkMode();
      saveState();
      showToast('Selected items marked done', 'success');
    }

    function bulkDelete() {
      if (!ui.selectedIds.size) return;
      [...ui.selectedIds].forEach(deleteProductSilently);
      clearBulkMode();
      saveState();
      showToast('Selected items moved to recycle bin', 'warning');
    }

    function openMoveCopySheet(mode) {
      if (!ui.selectedIds.size) return showToast('Long press items first to select them.', 'warning');
      openOverlay(`
        <div class="overlay-header"><strong>${mode === 'move' ? 'Move' : 'Copy'} Selected Items</strong><button class="icon-btn" style="width:36px;height:36px" onclick="closeOverlay()"><i class="fas fa-times"></i></button></div>
        <div class="overlay-body">
          ${state.lists.map(list => `<div class="drop-row" onclick="applyMoveCopy('${mode}','${list.id}')"><span>${escapeHtml(displayListName(list))}</span><span class="small muted">${state.products.filter(p => p.listId === list.id).length} items</span></div>`).join('')}
        </div>
      `, 'sheet');
    }

    function applyMoveCopy(mode, targetListId) {
      const ids = [...ui.selectedIds];
      if (mode === 'move') {
        state.products.forEach(p => { if (ids.includes(p.id)) p.listId = targetListId; });
      } else {
        const clones = state.products.filter(p => ids.includes(p.id)).map(p => ({ ...p, id: uid('prod'), listId: targetListId, createdAt: Date.now(), isCompleted: false, completedAt: null }));
        state.products.push(...clones);
      }
      closeOverlay();
      clearBulkMode();
      saveState();
      showToast(`${mode === 'move' ? 'Moved' : 'Copied'} selected items`, 'success');
    }

    function markAllInScope(done) {
      filterProducts(getScopeProducts()).forEach(p => {
        p.isCompleted = done;
        p.completedAt = done ? Date.now() : null;
      });
      saveState();
      showToast(done ? 'All items checked' : 'All items unchecked', 'success');
    }

    function saveListTypeModal(typeId) {
      const name = document.getElementById('listTypeName').value.trim();
      const icon = document.getElementById('listTypeIcon').value.trim() || '📦';
      if (!name) return showToast('List type name is required.', 'error');
      if (typeId) {
        const type = state.listTypes.find(t => t.id === typeId);
        if (type) { type.name = name; type.icon = icon; }
      } else {
        state.listTypes.push({ id: uid('type'), name, icon, isDefault: false });
      }
      closeOverlay();
      saveState();
      showToast('List type saved', 'success');
    }

    function saveListModal(listId) {
      const typeId = document.getElementById('listTypeSelect').value;
      const name = document.getElementById('listNameInput').value.trim();
      const emoji = document.getElementById('listEmojiInput').value.trim() || '📋';
      const color = document.getElementById('listColorHolder').value || '#F97316';
      if (!name) return showToast('List name is required.', 'error');
      if (listId) {
        const list = state.lists.find(l => l.id === listId);
        if (list) { list.typeId = typeId; list.name = name; list.emoji = emoji; list.color = color; }
      } else {
        const list = { id: uid('list'), typeId, name, emoji, color, createdAt: Date.now(), order: state.lists.length };
        state.lists.push(list);
        state.settings.activeListId = list.id;
      }
      closeOverlay();
      saveState();
      showToast('List saved', 'success');
    }

    function listMove(listId, direction) {
      const ordered = state.lists.sort((a,b)=>a.order-b.order);
      const index = ordered.findIndex(l => l.id === listId);
      const target = index + direction;
      if (target < 0 || target >= ordered.length) return;
      [ordered[index].order, ordered[target].order] = [ordered[target].order, ordered[index].order];
      saveState();
      openManageLists();
    }

    function duplicateList(listId) {
      const list = state.lists.find(l => l.id === listId);
      if (!list) return;
      const newListId = uid('list');
      state.lists.push({ ...list, id: newListId, name: `${list.name} Copy`, createdAt: Date.now(), order: state.lists.length });
      const clonedProducts = state.products.filter(p => p.listId === listId).map(p => ({ ...p, id: uid('prod'), listId: newListId, createdAt: Date.now(), isCompleted: false, completedAt: null }));
      state.products.push(...clonedProducts);
      saveState();
      openManageLists();
      showToast('List duplicated', 'success');
    }

    function confirmDeleteActiveList() {
      const active = getActiveList();
      if (!active) return;
      showConfirm('Delete Active List', `Delete ${displayListName(active)} and move it to recycle bin?`, `deleteList('${active.id}')`);
    }

    function deleteList(listId) {
      const list = state.lists.find(l => l.id === listId);
      if (!list) return;
      const linkedProducts = state.products.filter(p => p.listId === listId);
      state.lists = state.lists.filter(l => l.id !== listId);
      state.products = state.products.filter(p => p.listId !== listId);
      state.recycleBin.unshift({ id: uid('bin'), entity: 'list', data: list, linkedProducts, deletedAt: Date.now() });
      if (state.settings.activeListId === listId) state.settings.activeListId = state.lists[0]?.id || null;
      ensureState();
      closeOverlay();
      saveState();
      showToast('List moved to recycle bin', 'warning');
    }

    function saveCategoryModal(categoryId) {
      const name = document.getElementById('categoryNameInput').value.trim();
      const color = document.getElementById('categoryColorHolder').value || '#F97316';
      if (!name) return showToast('Category name is required.', 'error');
      if (categoryId) {
        const category = state.categories.find(c => c.id === categoryId);
        if (category) { category.name = name; category.color = color; }
      } else {
        state.categories.push({ id: uid('cat'), name, color, createdAt: Date.now(), order: state.categories.length });
      }
      closeOverlay();
      saveState();
      showToast('Category saved', 'success');
    }

    function confirmDeleteCategory(categoryId) {
      const category = getCategory(categoryId);
      if (!category) return;
      showConfirm('Delete Category', `Delete ${category.name}? Products will remain but lose this category.`, `deleteCategory('${categoryId}')`);
    }

    function deleteCategory(categoryId) {
      state.categories = state.categories.filter(c => c.id !== categoryId);
      state.products.forEach(p => p.categoryIds = p.categoryIds.filter(id => id !== categoryId));
      saveState();
      showToast('Category deleted', 'warning');
    }

    function saveMetaModal(kind, itemId) {
      const name = document.getElementById('metaNameInput').value.trim();
      const color = document.getElementById('metaColorHolder').value || '#F97316';
      const emoji = document.getElementById('metaEmojiInput')?.value.trim() || '🏷️';
      if (!name) return showToast('Name is required.', 'error');
      const source = kind === 'tag' ? state.tags : state.labels;
      if (itemId) {
        const item = source.find(x => x.id === itemId);
        if (item) {
          item.name = name;
          item.color = color;
          if (kind === 'label') item.emoji = emoji;
        }
      } else {
        if (kind === 'tag') source.push({ id: uid('tag'), name, color, icon: '🏷️', isDefault: false });
        else source.push({ id: uid('label'), name, color, emoji, createdAt: Date.now() });
      }
      closeOverlay();
      saveState();
      showToast(`${kind === 'tag' ? 'Tag' : 'Label'} saved`, 'success');
    }

    function deleteTag(tagId) {
      state.tags = state.tags.filter(t => t.id !== tagId);
      state.products.forEach(p => p.tagIds = p.tagIds.filter(id => id !== tagId));
      saveState();
      showToast('Tag deleted', 'warning');
    }

    function deleteLabel(labelId) {
      state.labels = state.labels.filter(l => l.id !== labelId);
      state.products.forEach(p => p.labelIds = p.labelIds.filter(id => id !== labelId));
      saveState();
      showToast('Label deleted', 'warning');
    }

    function togglePick(button) {
      button.classList.toggle('on');
    }

    function selectColorPick(button, targetId) {
      document.querySelectorAll(`[onclick*="${targetId}"]`).forEach(el => el.classList.remove('on', 'orange'));
      button.classList.add('on', 'orange');
      document.getElementById(targetId).value = button.dataset.color;
    }

    function stepQty(delta) {
      const input = document.getElementById('productQtyInput');
      const next = Math.max(0, Number(input.value || 0) + delta);
      input.value = next % 1 === 0 ? next.toFixed(0) : next.toFixed(1);
      updateProductTotalPreview();
    }

    function updateProductTotalPreview() {
      const qty = Number(document.getElementById('productQtyInput')?.value || 0);
      const price = Number(document.getElementById('productPriceInput')?.value || 0);
      const total = qty * price;
      const preview = document.getElementById('productTotalPreview');
      if (preview) preview.textContent = formatMoney(total);
    }

    function saveProductModal() {
      const editingId = document.getElementById('productEditingId').value;
      const name = document.getElementById('productNameInput').value.trim();
      if (!name) return showToast('Product name is required.', 'error');
      const categoryIds = [...document.querySelectorAll('[data-role="product-category"].on')].map(el => el.dataset.id);
      const tagIds = [...document.querySelectorAll('[data-role="product-tag"].on')].map(el => el.dataset.id);
      const labelIds = [...document.querySelectorAll('[data-role="product-label"].on')].map(el => el.dataset.id);
      const quantity = Number(document.getElementById('productQtyInput').value || 1);
      const unit = document.getElementById('productUnitSelect').value;
      const unitPrice = Number(document.getElementById('productPriceInput').value || 0);
      const supplier = document.getElementById('productSupplierInput').value.trim();
      const notes = document.getElementById('productNotesInput').value.trim();
      const isPinned = document.getElementById('pinSwitch').classList.contains('on');

      if (editingId) {
        const product = state.products.find(p => p.id === editingId);
        if (product) Object.assign(product, { name, categoryIds, tagIds, labelIds, quantity, unit, unitPrice, supplier, notes, isPinned });
      } else {
        const active = getActiveList();
        state.products.push({ id: uid('prod'), listId: active.id, name, categoryIds, tagIds, labelIds, quantity, unit, unitPrice, supplier, notes, isPinned, isCompleted: false, createdAt: Date.now(), completedAt: null });
      }
      closeOverlay();
      saveState();
      showToast('Product saved', 'success');
    }

    function deleteProduct(productId) {
      const product = state.products.find(p => p.id === productId);
      if (!product) return;
      showConfirm('Delete Product', `Move ${product.name} to recycle bin?`, `deleteProductConfirmed('${productId}')`);
    }

    function deleteProductConfirmed(productId) {
      deleteProductSilently(productId);
      saveState();
      showToast('Product moved to recycle bin', 'warning');
    }

    function deleteProductSilently(productId) {
      const product = state.products.find(p => p.id === productId);
      if (!product) return;
      state.products = state.products.filter(p => p.id !== productId);
      state.recycleBin.unshift({ id: uid('bin'), entity: 'product', data: product, deletedAt: Date.now(), sourceListId: product.listId });
    }

    function restoreBinItem(binId) {
      const item = state.recycleBin.find(b => b.id === binId);
      if (!item) return;
      if (item.entity === 'product') {
        state.products.push(item.data);
      } else if (item.entity === 'list') {
        state.lists.push(item.data);
        if (Array.isArray(item.linkedProducts)) state.products.push(...item.linkedProducts);
      }
      state.recycleBin = state.recycleBin.filter(b => b.id !== binId);
      saveState();
      showToast('Item restored', 'success');
    }

    function deleteBinForever(binId) {
      state.recycleBin = state.recycleBin.filter(b => b.id !== binId);
      saveState();
      showToast('Deleted forever', 'warning');
    }

    function emptyRecycleBin() {
      showConfirm('Empty Recycle Bin', 'This will permanently delete all recycle bin items.', `state.recycleBin=[];saveState();showToast('Recycle bin cleared','warning')`);
    }

    function confirmDeleteAllProducts() {
      showConfirm('Delete All Products', 'Move all currently visible products to recycle bin?', `deleteAllVisibleProducts()`);
    }

    function deleteAllVisibleProducts() {
      const ids = filterProducts(getScopeProducts()).map(p => p.id);
      ids.forEach(deleteProductSilently);
      saveState();
      showToast('Visible products moved to recycle bin', 'warning');
    }

    function shareActiveListText() {
      const active = getActiveList();
      if (!active) return showToast('No active list selected.', 'warning');
      const products = state.products.filter(p => p.listId === active.id);
      if (!products.length) return showToast('This list is empty.', 'warning');
      const groups = buildCategoryGroups(products);
      let text = `📋 List: ${displayListName(active)}\n\n`;
      groups.forEach(group => {
        text += `🏷️ ${group.category?.name || 'Uncategorized'}\n`;
        group.items.forEach(item => {
          text += `${item.isCompleted ? '✅' : '⬜'} ${item.name} (${item.quantity} ${item.unit === 'None' ? '' : item.unit})`;
          if (item.unitPrice) text += ` - ${formatMoney(item.unitPrice)}`;
          text += `\n`;
        });
        text += `\n`;
      });
      const total = products.reduce((sum, p) => sum + calcProductTotal(p), 0);
      text += `Total: ${formatMoney(total)}\nShared from HV Shopping List`;
      if (navigator.share) navigator.share({ title: active.name, text }).catch(() => {});
      else window.open(`https://wa.me/?text=${encodeURIComponent(text)}`, '_blank');
    }

    function exportJSON() {
      const blob = new Blob([JSON.stringify(state, null, 2)], { type: 'application/json' });
      downloadBlob(blob, `hv-shopping-list-backup-${Date.now()}.json`);
      showToast('JSON exported', 'success');
    }

    function exportCSV() {
      const rows = [['List','Product','Categories','Tags','Labels','Qty','Unit','Unit Price','Total','Supplier','Notes','Completed']];
      state.products.forEach(p => {
        const list = state.lists.find(l => l.id === p.listId);
        rows.push([
          displayListName(list),
          p.name,
          p.categoryIds.map(id => getCategory(id)?.name || '').join(' | '),
          p.tagIds.map(id => getTag(id)?.name || '').join(' | '),
          p.labelIds.map(id => getLabel(id)?.name || '').join(' | '),
          p.quantity,
          p.unit,
          p.unitPrice,
          calcProductTotal(p),
          p.supplier,
          p.notes,
          p.isCompleted ? 'Yes' : 'No'
        ]);
      });
      const csv = rows.map(row => row.map(cell => `"${String(cell ?? '').replace(/"/g, '""')}"`).join(',')).join('\n');
      downloadBlob(new Blob([csv], { type: 'text/csv' }), `hv-shopping-list-${Date.now()}.csv`);
      showToast('CSV exported', 'success');
    }

    function printList() {
      window.print();
    }

    function importJSONFile(event) {
      const file = event.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = () => {
        try {
          const parsed = JSON.parse(reader.result);
          state = normalizeState(parsed);
          ensureState();
          localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
          renderApp();
          showToast('Data imported successfully', 'success');
        } catch (e) {
          showToast('Invalid backup file', 'error');
        }
      };
      reader.readAsText(file);
      event.target.value = '';
    }

    function toggleTheme() {
      state.settings.theme = state.settings.theme === 'dark' ? 'light' : 'dark';
      saveState();
    }

    function toggleVoice() {
      state.settings.voiceEnabled = state.settings.voiceEnabled === false;
      saveState();
    }

    function setVoiceLang(lang) {
      state.settings.voiceLang = lang;
      saveState();
    }

    function rateUs() {
      showToast('Thanks! Share the app with your team and friends ⭐', 'success');
    }

    function shareApp() {
      const url = location.href;
      if (navigator.share) navigator.share({ title: 'HV Shopping List', text: 'Try this smart store manager app!', url }).catch(() => {});
      else navigator.clipboard.writeText(url).then(() => showToast('App link copied', 'success')).catch(() => window.open(url, '_blank'));
    }

    function downloadBlob(blob, filename) {
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = filename;
      a.click();
      URL.revokeObjectURL(url);
    }

    function timeAgo(ts) {
      const diff = Date.now() - ts;
      const mins = Math.floor(diff / 60000);
      if (mins < 60) return `${mins || 1} min ago`;
      const hrs = Math.floor(mins / 60);
      if (hrs < 24) return `${hrs} hr ago`;
      const days = Math.floor(hrs / 24);
      return `${days} day${days > 1 ? 's' : ''} ago`;
    }

    function escapeHtml(str) {
      return String(str ?? '').replace(/[&<>"']/g, (m) => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[m]));
    }

    function showToast(message, type = '') {
      const wrap = document.getElementById('toastWrap');
      const div = document.createElement('div');
      div.className = `toast ${type}`;
      div.textContent = message;
      wrap.appendChild(div);
      setTimeout(() => div.remove(), 2800);
    }

    function checkStorageUsage() {
      let total = 0;
      for (const key in localStorage) total += (localStorage[key] || '').length * 2;
      if (total > 4 * 1024 * 1024) showToast(`Storage usage ${(total / 1024 / 1024).toFixed(1)}MB`, 'warning');
    }

    function initOfflineDetection() {
      const banner = document.getElementById('offlineBanner');
      function update() { banner.style.display = navigator.onLine ? 'none' : 'block'; }
      window.addEventListener('online', update);
      window.addEventListener('offline', update);
      update();
    }

    function registerServiceWorker() {
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/HV-Shopping-List/sw.js', { scope: '/HV-Shopping-List/' }).catch(() => {});
        });
      }
    }

    function initInstallPrompt() {
      window.addEventListener('beforeinstallprompt', (e) => {
        e.preventDefault();
        ui.deferredPrompt = e;
        renderInstallBanner();
      });
      window.addEventListener('appinstalled', () => {
        ui.deferredPrompt = null;
        renderInstallBanner();
      });
